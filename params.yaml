prepare_categories:
  category_tree_path: "data/category_tree.csv"
  output_dir_path: "data/prepared"
prepare_sessions:
  events_path: "data/events.csv"
  output_dir_path: "data/prepared"
prepare_item_properties:
  item_properties_part1_path: "data/item_properties_part1.csv"
  item_properties_part2_path: "data/item_properties_part2.csv"
  output_dir_path: "data/prepared"
featurize:
  categories_path: "data/prepared/categories.parquet"
  item_properties_path: "data/prepared/item_properties.parquet"
  sessions_path: "data/prepared/sessions.parquet"
  categories_metadata_path: "data/prepared/categories_metadata.json"
  item_properties_metadata_path: "data/prepared/item_properties_metadata.json"
  output_dir_path: "data/prepared"
train_baseline_model:
  enriched_sessions_path: "data/prepared/enriched_sessions.parquet"
  metadata_path: "data/prepared/metadata.json"
  output_dir_path: "models"
  batch_size: 64
  learning_rate: 0.001
  num_epochs: 5
  output_dim: 32
  model_version: "1.0.0"